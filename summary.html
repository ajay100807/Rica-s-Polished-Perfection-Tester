<!DOCTYPE html>
<html>

<head>

<title>
Booking Summary
</title>

</head>

<body>

<h1>
Booking Summary
</h1>

<div id="summary"></div>

<script>

const booking =
JSON.parse(
localStorage.getItem(
"booking"
)
);

document.getElementById(
"summary"
).innerHTML = `

<p>
Name:
${booking.fullName}
</p>

<p>
Service:
${booking.service}
</p>

<p>
Design:
${booking.design}
</p>

<p>
Date:
${booking.date}
</p>

`;

</script>

</body>

</html>
